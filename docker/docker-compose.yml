# PLUGIN_DEPS_DIR is set by bdd:stack (default: ~/.checkmate-bdd)
# checkmate-mcp is built from source cloned by scripts/clone-deps.sh.
# checkmate and playwright-http are pulled from ghcr.io/joshmullikin/.

services:
  checkmate:
    image: ghcr.io/joshmullikin/checkmate:latest
    ports:
      - "8000:8000"
    environment:
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-changeme-replace-in-production}
      PLAYWRIGHT_EXECUTOR_URL: http://playwright-http:8932
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 12
    depends_on:
      playwright-http:
        condition: service_healthy

  playwright-http:
    image: ghcr.io/joshmullikin/playwright-http:latest
    ports:
      - "8932:8932"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8932/health"]
      interval: 5s
      timeout: 3s
      retries: 12

  checkmate-mcp:
    build:
      context: ${PLUGIN_DEPS_DIR}/checkmate-mcp
      dockerfile: Dockerfile
    ports:
      - "3003:3003"
    environment:
      CHECKMATE_URL: http://checkmate:8000
      PORT: "3003"
    depends_on:
      checkmate:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/health"]
      interval: 5s
      timeout: 3s
      retries: 12
