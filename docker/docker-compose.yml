# All three services pulled from ghcr.io/joshmullikin/.
# PLUGIN_DEPS_DIR is still set by bdd:stack but only needed for backend source reads.

services:
  checkmate:
    image: ghcr.io/joshmullikin/checkmate:latest
    ports:
      - "8000:8000"
    environment:
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-changeme-replace-in-production}
      PLAYWRIGHT_EXECUTOR_URL: http://playwright-http:8932
    depends_on:
      playwright-http:
        condition: service_healthy

  playwright-http:
    image: ghcr.io/joshmullikin/playwright-http:latest
    ports:
      - "8932:8932"

  checkmate-mcp:
    image: ghcr.io/joshmullikin/checkmate-mcp:latest
    ports:
      - "3003:3003"
    environment:
      CHECKMATE_URL: http://checkmate:8000
      PORT: "3003"
    depends_on:
      checkmate:
        condition: service_healthy
